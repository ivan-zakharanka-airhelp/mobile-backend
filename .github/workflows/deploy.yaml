name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

# Explicit permissions — GITHUB_TOKEN needs `packages: write` to push to GHCR.
# Some accounts/orgs default to read-only, which causes docker push to fail.
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # QEMU lets the amd64 GitHub runner build for arm64 via binfmt emulation.
      # Needed because our EC2 is t4g (Graviton/ARM64).
      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/auth-api/Dockerfile
          platforms: linux/arm64        # must match EC2 architecture (t4g = Graviton)
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-api:${{ github.sha }}
          cache-from: type=gha          # speed up future builds via GHA cache
          cache-to: type=gha,mode=max

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          # KUBECONFIG must be set explicitly — non-interactive SSH doesn't source .bashrc
          # or .profile, so the shell env from cloud-init's bashrc line isn't inherited here.
          script: |
            export KUBECONFIG=/etc/rancher/k3s/k3s.yaml
            kubectl set image deployment/auth-api \
              auth-api=ghcr.io/${{ github.repository }}/auth-api:${{ github.sha }} \
              -n mobile-backend
            kubectl rollout status deployment/auth-api -n mobile-backend --timeout=120s
