name: Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:

# Explicit permissions — GITHUB_TOKEN needs `packages: write` to push to GHCR.
# Some accounts/orgs default to read-only, which causes docker push to fail.
permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}
    
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/auth-api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/auth-api:${{ github.sha }}

      - name: Deploy to k3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            kubectl set image deployment/auth-api \
              auth-api=ghcr.io/${{ github.repository }}/auth-api:${{ github.sha }} \
              -n mobile-backend
            kubectl rollout status deployment/auth-api -n mobile-backend --timeout=120s
