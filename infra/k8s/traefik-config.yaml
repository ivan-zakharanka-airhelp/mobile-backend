apiVersion: helm.cattle.io/v1
kind: HelmChartConfig
metadata:
  name: traefik
  namespace: kube-system
spec:
  # Patches the default Traefik Helm chart that ships with k3s.
  # This file only specifies *overrides* — defaults remain intact.
  valuesContent: |
    # Bind Traefik pod ports directly to the EC2 host ports 80/443.
    # Needed because we installed k3s with --disable=servicelb, which removed
    # the klipper-lb pods that normally do this job.
    ports:
      web:
        hostPort: 80
      websecure:
        hostPort: 443

    # On a single-node cluster, two pods can't bind the same hostPort at the
    # same time. RollingUpdate (default) creates the new pod before killing the
    # old one → deadlock. Recreate kills the old pod first, then starts the new.
    # Brief downtime during rollout is acceptable for a single-node learning setup.
    deployment:
      kind: Deployment
      replicas: 1
    updateStrategy:
      type: Recreate

    # Let's Encrypt production issuer. Traefik handles the ACME HTTP-01
    # challenge automatically on the `web` entryPoint (port 80) for any
    # Host() matches on routes where tls.certResolver: letsencrypt is set.
    #
    # NOTE: /data/acme.json is ephemeral here — Traefik re-issues the cert
    # on every pod restart. For a learning project this is fine (5 certs/week
    # limit per domain is plenty). For production, enable persistence so the
    # cert survives restarts.
    certificatesResolvers:
      letsencrypt:
        acme:
          email: ivan.zakharanka@airhelp.com
          storage: /data/acme.json
          httpChallenge:
            entryPoint: web

    additionalArguments:
      - "--api.dashboard=false"
      - "--log.level=INFO"
