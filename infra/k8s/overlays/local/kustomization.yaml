apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Inherit all resources from base (production manifests)
resources:
  - ../../base
  - secrets.yaml

# Patch IngressRoute for local dev:
# 1. Replace routes + entryPoints (merge patch)
# 2. Remove TLS block (JSON patch — kustomize merge can't delete fields)
patches:
  - path: ingress-patch.yaml
  - target:
      kind: IngressRoute
      name: api-gateway
    patch: |
      - op: remove
        path: /spec/tls
